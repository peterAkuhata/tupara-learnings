<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Year 9 Science Quiz</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #ffffff; --bg2: #f5f5f3; --bg3: #eeece8;
    --text: #1a1a18; --text2: #5a5a56; --text3: #9a9a94;
    --border: rgba(0,0,0,0.12); --border2: rgba(0,0,0,0.22);
    --blue-bg: #e6f1fb; --blue-border: #b5d4f4; --blue-text: #0c447c;
    --green-bg: #eaf3de; --green-border: #c0dd97; --green-text: #3b6d11;
    --red-bg: #fcebeb; --red-border: #f7c1c1; --red-text: #791f1f;
    --amber-bg: #faeeda; --amber-border: #fac775; --amber-text: #633806;
    --radius: 10px; --radius-sm: 6px;
  }
  body { font-family: Georgia, 'Times New Roman', serif; background: var(--bg3); color: var(--text); min-height: 100vh; }
  .shell { max-width: 780px; margin: 0 auto; padding: 2rem 1.25rem 4rem; }

  /* Header */
  .site-header { text-align: center; margin-bottom: 2.5rem; padding-bottom: 1.5rem; border-bottom: 0.5px solid var(--border); }
  .site-header h1 { font-size: 28px; font-weight: normal; letter-spacing: -0.5px; color: var(--text); }
  .site-header p { font-size: 14px; color: var(--text2); margin-top: 6px; font-family: system-ui, sans-serif; }
  .badge-row { display: flex; justify-content: center; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
  .badge { font-family: system-ui, sans-serif; font-size: 11px; padding: 3px 10px; border-radius: 20px; border: 0.5px solid var(--border2); color: var(--text2); background: var(--bg); }

  /* Progress */
  .progress-wrap { margin-bottom: 2rem; }
  .progress-meta { display: flex; justify-content: space-between; font-family: system-ui, sans-serif; font-size: 12px; color: var(--text3); margin-bottom: 6px; }
  .prog-bar { height: 3px; background: var(--border); border-radius: 2px; }
  .prog-fill { height: 3px; background: var(--text2); border-radius: 2px; transition: width 0.4s ease; }

  /* Topic heading */
  .topic-label { font-family: system-ui, sans-serif; font-size: 11px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text3); margin: 2rem 0 0.75rem; }
  .topic-label:first-of-type { margin-top: 0; }

  /* Question card */
  .qcard { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 1.25rem; margin-bottom: 0.75rem; }
  .qnum { font-family: system-ui, sans-serif; font-size: 11px; color: var(--text3); margin-bottom: 6px; }
  .qtext { font-size: 15px; line-height: 1.6; color: var(--text); margin-bottom: 10px; }
  .hint { font-family: system-ui, sans-serif; font-size: 12px; color: var(--text3); font-style: italic; margin-bottom: 12px; }
  .options { display: flex; flex-direction: column; gap: 7px; }
  .opt { display: flex; align-items: center; gap: 10px; padding: 9px 12px; border: 0.5px solid var(--border); border-radius: var(--radius-sm); cursor: pointer; transition: background 0.12s, border-color 0.12s; font-family: system-ui, sans-serif; font-size: 13.5px; color: var(--text); }
  .opt:hover { background: var(--bg2); border-color: var(--border2); }
  .opt.selected { background: var(--blue-bg); border-color: var(--blue-border); color: var(--blue-text); }
  .opt.correct  { background: var(--green-bg); border-color: var(--green-border); color: var(--green-text); }
  .opt.wrong    { background: var(--red-bg); border-color: var(--red-border); color: var(--red-text); }
  .opt.missed   { background: var(--amber-bg); border-color: var(--amber-border); color: var(--amber-text); }
  .opt.disabled { cursor: default; }
  .cb { width: 16px; height: 16px; border: 1.5px solid var(--border2); border-radius: 3px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 10px; }
  .opt.selected .cb { background: var(--blue-text); border-color: var(--blue-text); color: #fff; }
  .opt.correct  .cb { background: var(--green-text); border-color: var(--green-text); color: #fff; }
  .opt.wrong    .cb { background: var(--red-text); border-color: var(--red-text); color: #fff; }
  .opt.missed   .cb { background: var(--amber-text); border-color: var(--amber-text); color: #fff; }
  .check-btn { margin-top: 12px; font-family: system-ui, sans-serif; font-size: 12px; padding: 6px 14px; border-radius: var(--radius-sm); border: 0.5px solid var(--border2); background: transparent; cursor: pointer; color: var(--text2); transition: background 0.12s; }
  .check-btn:hover { background: var(--bg2); }
  .check-btn.done { opacity: 0.4; cursor: default; }

  /* Controls */
  .controls { position: sticky; bottom: 0; background: rgba(238,236,232,0.95); backdrop-filter: blur(8px); border-top: 0.5px solid var(--border); padding: 1rem 0; display: flex; justify-content: space-between; align-items: center; gap: 12px; margin-top: 2rem; }
  .score-display { font-family: system-ui, sans-serif; font-size: 13px; color: var(--text2); }
  .score-display strong { color: var(--text); font-size: 16px; }
  .btn { font-family: system-ui, sans-serif; font-size: 13px; padding: 8px 18px; border-radius: var(--radius-sm); border: 0.5px solid var(--border2); background: var(--bg); cursor: pointer; color: var(--text); transition: background 0.12s; }
  .btn:hover { background: var(--bg2); }
  .btn.primary { background: var(--text); color: var(--bg); border-color: var(--text); }
  .btn.primary:hover { opacity: 0.8; }

  /* Results banner */
  .results-banner { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 2rem; text-align: center; margin-bottom: 2rem; }
  .results-banner .pct { font-size: 56px; font-weight: normal; }
  .results-banner .msg { font-family: system-ui, sans-serif; font-size: 14px; color: var(--text2); margin-top: 6px; }
  .results-banner .breakdown { display: flex; justify-content: center; gap: 24px; margin-top: 1rem; }
  .results-banner .stat { font-family: system-ui, sans-serif; font-size: 12px; color: var(--text3); }
  .results-banner .stat strong { display: block; font-size: 18px; color: var(--text); }

  @media (max-width: 500px) { .shell { padding: 1rem 0.75rem 3rem; } .qtext { font-size: 14px; } }
</style>
</head>
<body>
<div class="shell">
  <div class="site-header">
    <h1>Year 9 Science Quiz</h1>
    <p>Select all correct answers, then check each question</p>
    <div class="badge-row">
      <span class="badge">104 questions</span>
      <span class="badge">Multi-select</span>
      <span class="badge">10 topics</span>
      <span class="badge">Age 13+</span>
    </div>
  </div>

  <div class="progress-wrap">
    <div class="progress-meta">
      <span id="prog-label">0 of 104 checked</span>
      <span id="score-label">Score: 0%</span>
    </div>
    <div class="prog-bar"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
  </div>

  <div id="quiz-root"></div>

  <div class="controls">
    <div class="score-display">Score: <strong id="live-score">—</strong></div>
    <div style="display:flex;gap:8px;">
      <button class="btn" onclick="checkAll()">Check all</button>
      <button class="btn primary" onclick="resetAll()">Retake quiz</button>
    </div>
  </div>
</div>

<script>
const ALL_QUESTIONS = [
  // ── LAB SAFETY & HAZARDS ──────────────────────────────────────────────────
  {topic:"Lab safety & hazards",q:"Which of the following are correct safety precautions when working in a science lab?",hint:"Think about protecting your body and your workspace.",options:["Wear safety goggles when heating substances","Tie long hair back","Point test tubes away from people when heating","Keep bags on the lab benches","Taste unknown chemicals to identify them","Wash hands after handling chemicals"],correct:[0,1,2,5]},
  {topic:"Lab safety & hazards",q:"Which hazard symbols would you expect to see on a bottle of concentrated hydrochloric acid?",hint:"Strong acids can burn skin and release fumes.",options:["Corrosive","Flammable","Toxic","Oxidising","Environmental hazard","Irritant"],correct:[0,2,5]},
  {topic:"Lab safety & hazards",q:"Which of the following describe what you should do if a chemical spills on your skin?",hint:"Speed is important when dealing with chemical spills.",options:["Run the affected area under cold water immediately","Tell the teacher straight away","Wipe it off with a paper towel and carry on","Remove contaminated clothing if safe to do so","Apply a bandage to the area","Rinse for at least 10 minutes"],correct:[0,1,3,5]},
  {topic:"Lab safety & hazards",q:"Which pieces of personal protective equipment (PPE) are typically used in a school science lab?",hint:"PPE protects different parts of your body.",options:["Safety goggles","Lab coat","Gloves when handling hazardous materials","Hard hat","Steel-toed boots","Face shield for very hazardous work"],correct:[0,1,2,5]},

  // ── EQUIPMENT ─────────────────────────────────────────────────────────────
  {topic:"Lab equipment",q:"Which pieces of equipment are used to accurately measure the volume of a liquid?",hint:"Think about which items have volume markings.",options:["Measuring cylinder","Beaker","Burette","Conical flask","Pipette","Evaporating basin"],correct:[0,2,4]},
  {topic:"Lab equipment",q:"A student wants to filter a mixture of sand and water. Which equipment do they need?",hint:"Filtration separates an insoluble solid from a liquid.",options:["Filter paper","Funnel","Conical flask","Bunsen burner","Tripod","Glass rod"],correct:[0,1,2,5]},
  {topic:"Lab equipment",q:"Which statements about a Bunsen burner flame are correct?",hint:"The air hole controls which type of flame is produced.",options:["The blue flame is hotter than the yellow flame","The yellow flame is called the safety flame","Opening the air hole fully produces the blue flame","The yellow flame is used for heating","The blue flame is sometimes called the roaring flame","Closing the air hole produces the blue flame"],correct:[0,1,2,4]},
  {topic:"Lab equipment",q:"Which of the following are used to measure mass in a science lab?",hint:"Mass is different from weight.",options:["Top-pan balance","Measuring cylinder","Newton meter","Electronic balance","Triple beam balance","Thermometer"],correct:[0,3,4]},

  // ── CELLS & CELL STRUCTURE ────────────────────────────────────────────────
  {topic:"Cells & cell structure",q:"Which of the following structures are found in BOTH plant and animal cells?",hint:"Think about what all living cells need to function.",options:["Cell membrane","Cell wall","Nucleus","Chloroplasts","Mitochondria","Cytoplasm"],correct:[0,2,4,5]},
  {topic:"Cells & cell structure",q:"Which structures are found in plant cells but NOT in animal cells?",hint:"Plants make their own food and have a rigid shape.",options:["Chloroplasts","Large permanent vacuole","Cell wall made of cellulose","Mitochondria","Nucleus","Ribosomes"],correct:[0,1,2]},
  {topic:"Cells & cell structure",q:"Which of the following correctly describe the function of the mitochondria?",hint:"Think about where energy is released in cells.",options:["Site of aerobic respiration","Releases energy from glucose","Found in both plant and animal cells","Produces proteins","Contains chlorophyll","Can be more numerous in active muscle cells"],correct:[0,1,2,5]},
  {topic:"Cells & cell structure",q:"Which statements about the nucleus are correct?",hint:"The nucleus controls the cell's activities.",options:["It contains DNA","It controls what the cell does","It is surrounded by a nuclear membrane","It is found in all cells including bacteria","It contains chromosomes","It is the site of photosynthesis"],correct:[0,1,2,4]},
  {topic:"Cells & cell structure",q:"Which of the following are examples of specialised animal cells?",hint:"Specialised cells have adaptations for a specific job.",options:["Red blood cells","Root hair cells","Sperm cells","Nerve cells","Guard cells","Palisade cells"],correct:[0,2,3]},
  {topic:"Cells & cell structure",q:"Which statements correctly describe how substances move into and out of cells?",hint:"Think about concentration gradients and cell membranes.",options:["Diffusion moves substances from high to low concentration","Osmosis is the movement of water through a partially permeable membrane","Active transport requires energy","Diffusion requires no energy","Osmosis moves substances against a concentration gradient","Active transport moves substances from high to low concentration"],correct:[0,1,2,3]},
  {topic:"Cells & cell structure",q:"Which of the following are correct descriptions of prokaryotic cells?",hint:"Bacteria are prokaryotes — they are simpler than animal or plant cells.",options:["They have no membrane-bound nucleus","They are smaller than eukaryotic cells","They have a cell wall","They contain mitochondria","They have a circular chromosome","They are found in animals"],correct:[0,1,2,4]},
  {topic:"Cells & cell structure",q:"Which of the following are functions of the cell membrane?",hint:"The membrane controls what enters and leaves the cell.",options:["Controls what enters and leaves the cell","Provides strength and rigidity","Allows diffusion of small molecules","Site of photosynthesis","Separates cell contents from the environment","Allows selective transport of substances"],correct:[0,2,4,5]},

  // ── PERIODIC TABLE & ELEMENTS ─────────────────────────────────────────────
  {topic:"The periodic table",q:"Which of the following statements about the periodic table are correct?",hint:"The periodic table is organised by atomic number.",options:["Elements are arranged in order of increasing atomic number","Elements in the same group have similar chemical properties","Periods go across the table","Groups go across the table","Metals are generally on the right side","Non-metals are generally on the right side"],correct:[0,1,2,5]},
  {topic:"The periodic table",q:"Which of the following are properties of metals?",hint:"Think about how metals look and how they conduct things.",options:["Good conductors of electricity","Shiny when freshly cut","Generally brittle","High melting points","Low density","Malleable (can be bent and shaped)"],correct:[0,1,3,5]},
  {topic:"The periodic table",q:"Which elements are in Group 1 of the periodic table?",hint:"Group 1 elements are called the alkali metals.",options:["Lithium","Sodium","Calcium","Potassium","Magnesium","Francium"],correct:[0,1,3,5]},
  {topic:"The periodic table",q:"Which of the following are correct statements about noble gases (Group 0)?",hint:"Noble gases are very unreactive.",options:["They have a full outer electron shell","They are very unreactive","They are all diatomic molecules","They exist as single atoms","Helium is used in balloons","They easily form compounds with other elements"],correct:[0,1,3,4]},
  {topic:"The periodic table",q:"Which statements about atomic structure are correct?",hint:"Atoms have a nucleus surrounded by electrons.",options:["Protons have a positive charge","Neutrons have no charge","Electrons are found in the nucleus","The nucleus contains protons and neutrons","Electrons have a negative charge","Atoms have more protons than electrons"],correct:[0,1,3,4]},
  {topic:"The periodic table",q:"Which of the following are properties of non-metals?",hint:"Non-metals are very different from metals in their properties.",options:["Poor conductors of electricity","Often have low melting points","Generally dull in appearance","Malleable and ductile","Poor conductors of heat","Always exist as gases at room temperature"],correct:[0,1,2,4]},
  {topic:"The periodic table",q:"Which of the following statements about Group 7 (halogens) are correct?",hint:"Halogens are reactive non-metals.",options:["They become less reactive going down the group","Fluorine is more reactive than chlorine","They form salts when reacting with metals","They exist as diatomic molecules","Chlorine is a green gas","Iodine is a shiny grey solid at room temperature"],correct:[1,2,3,4,5]},
  {topic:"The periodic table",q:"Which of the following correctly describe isotopes?",hint:"Isotopes are atoms of the same element with different masses.",options:["Isotopes have the same number of protons","Isotopes have different numbers of neutrons","Isotopes are atoms of different elements","Isotopes have the same atomic number","Isotopes have the same chemical properties","Isotopes always have different mass numbers"],correct:[0,1,3,4,5]},

  // ── FORCES & MOTION ───────────────────────────────────────────────────────
  {topic:"Forces & motion",q:"Which of the following are contact forces?",hint:"Contact forces require objects to be touching.",options:["Friction","Gravity","Normal reaction force","Magnetic force","Air resistance","Tension"],correct:[0,2,4,5]},
  {topic:"Forces & motion",q:"Which statements about gravity are correct?",hint:"Gravity is the force of attraction between masses.",options:["Gravity pulls objects towards the centre of the Earth","Weight is the force due to gravity","Mass and weight are the same thing","Gravity decreases as you move further from Earth","Objects fall at the same speed regardless of mass in a vacuum","The unit of weight is the Newton"],correct:[0,1,3,4,5]},
  {topic:"Forces & motion",q:"A car travels at a constant speed. Which of the following must be true?",hint:"Think about balanced and unbalanced forces.",options:["The driving force equals the friction force","The forces are balanced","The car is accelerating","The resultant force is zero","The car has no forces acting on it","The car has the same velocity throughout"],correct:[0,1,3,5]},
  {topic:"Forces & motion",q:"Which of the following correctly describe Newton's First Law of Motion?",hint:"Newton's First Law is about what happens when forces are balanced.",options:["An object at rest stays at rest unless acted on by a force","An object moving at constant velocity has balanced forces","An object accelerates when an unbalanced force acts on it","Force equals mass times acceleration","A moving object will keep moving at the same speed and direction unless a force acts","Objects naturally slow down without any force"],correct:[0,1,4]},
  {topic:"Forces & motion",q:"Which of the following correctly describe speed and velocity?",hint:"Speed and velocity are related but not the same thing.",options:["Speed is a scalar quantity","Velocity includes direction","Speed = distance ÷ time","Velocity is always equal to speed","A car going round a roundabout at constant speed has changing velocity","Speed and velocity always have the same value"],correct:[0,1,2,4]},
  {topic:"Forces & motion",q:"Which of the following affect the stopping distance of a car?",hint:"Stopping distance = thinking distance + braking distance.",options:["Speed of the car","Road conditions (wet or dry)","Condition of the tyres","Colour of the car","Reaction time of the driver","Mass of the car"],correct:[0,1,2,4,5]},
  {topic:"Forces & motion",q:"Which statements about pressure are correct?",hint:"Pressure depends on force and the area it acts over.",options:["Pressure = force ÷ area","Pressure is measured in Pascals (Pa)","A smaller area produces a higher pressure for the same force","Increasing the area decreases pressure","Pressure increases with depth in a fluid","A larger area always produces higher pressure"],correct:[0,1,2,3,4]},
  {topic:"Forces & motion",q:"Which of the following are examples of Newton's Third Law (action and reaction pairs)?",hint:"For every action there is an equal and opposite reaction.",options:["A rocket pushes gas backwards and the gas pushes the rocket forwards","A swimmer pushes water backwards and moves forwards","A book sits on a table and the table pushes the book up","Gravity pulls you down and the ground pushes you up","A car accelerates when the engine force exceeds friction","A skater pushes off a wall and moves away from it"],correct:[0,1,2,3,5]},

  // ── HUMAN BODY SYSTEMS ────────────────────────────────────────────────────
  {topic:"Human body systems",q:"Which of the following are functions of the circulatory system?",hint:"The heart is the pump of the circulatory system.",options:["Transporting oxygen to cells","Removing carbon dioxide from cells","Breaking down food into nutrients","Transporting hormones around the body","Fighting infection","Distributing heat around the body"],correct:[0,1,3,5]},
  {topic:"Human body systems",q:"Which of the following correctly describe the structure or function of the heart?",hint:"The heart has four chambers.",options:["The heart has four chambers","The left side of the heart pumps blood to the lungs","The right side of the heart pumps blood to the body","Valves in the heart prevent blood flowing backwards","The aorta carries oxygenated blood away from the heart","The pulmonary vein carries oxygenated blood from the lungs"],correct:[0,3,4,5]},
  {topic:"Human body systems",q:"Which of the following are correct statements about blood?",hint:"Blood contains several different components.",options:["Red blood cells carry oxygen","White blood cells fight infection","Platelets help blood to clot","Plasma carries dissolved substances","Red blood cells have a nucleus","Blood is made in bone marrow"],correct:[0,1,2,3,5]},
  {topic:"Human body systems",q:"Which of the following correctly describe the digestive system?",hint:"Digestion breaks food into small molecules that can be absorbed.",options:["Enzymes break down large food molecules","The stomach produces acid to kill bacteria","The small intestine absorbs nutrients into the blood","The large intestine produces digestive enzymes","Bile is produced by the liver","The mouth produces amylase to digest starch"],correct:[0,1,2,4,5]},
  {topic:"Human body systems",q:"Which statements about the respiratory system are correct?",hint:"The respiratory system allows gas exchange.",options:["Oxygen moves from the alveoli into the blood","Carbon dioxide moves from the blood into the alveoli","The diaphragm contracts during inhalation","The trachea carries air to the lungs","Gas exchange happens in the bronchi","Alveoli have a large surface area to aid gas exchange"],correct:[0,1,2,3,5]},
  {topic:"Human body systems",q:"Which of the following are features of the alveoli that make them efficient for gas exchange?",hint:"Efficient gas exchange requires maximum contact between air and blood.",options:["Large surface area","Thin walls","Good blood supply","Located outside the lungs","Moist surfaces","Thick walls to protect them"],correct:[0,1,2,4]},
  {topic:"Human body systems",q:"Which of the following are parts of the skeletal system and their correct functions?",hint:"The skeleton does more than just support the body.",options:["Bones protect internal organs","Muscles are attached to bones to allow movement","Red blood cells are made in bone marrow","The skeleton produces hormones","Joints allow bones to move","Cartilage cushions joints"],correct:[0,1,2,4,5]},
  {topic:"Human body systems",q:"Which of the following correctly describe the nervous system?",hint:"The nervous system detects and responds to stimuli.",options:["Neurons carry electrical signals","Sensory neurons carry signals from receptors to the brain","Motor neurons carry signals from the brain to effectors","The spinal cord is part of the peripheral nervous system","Synapses are gaps between neurons","Reflex actions involve the brain directly"],correct:[0,1,2,4]},

  // ── STATES OF MATTER ──────────────────────────────────────────────────────
  {topic:"States of matter",q:"Which of the following correctly describe the properties of a solid?",hint:"Think about how particles are arranged in a solid.",options:["Fixed shape","Fixed volume","Cannot be compressed","Particles vibrate in fixed positions","Particles move freely and randomly","Flows easily"],correct:[0,1,2,3]},
  {topic:"States of matter",q:"Which changes of state release energy to the surroundings?",hint:"Some changes of state release energy, others absorb it.",options:["Condensation","Freezing","Evaporation","Melting","Sublimation of iodine vapour back to solid","Deposition (gas directly to solid)"],correct:[0,1,5]},
  {topic:"States of matter",q:"Which of the following correctly describe evaporation?",hint:"Evaporation is different from boiling.",options:["It occurs at the surface of a liquid","It can happen below the boiling point","Faster-moving particles escape from the surface","It only occurs at the boiling point","It causes the remaining liquid to cool","It requires a heat source"],correct:[0,1,2,4]},
  {topic:"States of matter",q:"Which of the following are correct statements about particle theory?",hint:"Particle theory explains the properties of solids, liquids and gases.",options:["All matter is made of tiny particles","Particles in a gas are far apart","Particles in a liquid can move past each other","Particles in a solid have no energy","The speed of particles increases with temperature","Gases have a fixed volume"],correct:[0,1,2,4]},
  {topic:"States of matter",q:"Which of the following correctly describe what happens when a substance melts?",hint:"Melting changes a solid into a liquid.",options:["Energy is absorbed","Particles gain energy and vibrate more","Bonds between particles are overcome","The temperature stays constant during melting of a pure substance","The mass of the substance increases","Particles begin to move past each other"],correct:[0,1,2,3,5]},
  {topic:"States of matter",q:"Which of the following are correct about mixtures and pure substances?",hint:"A pure substance has a sharp melting point.",options:["A pure substance melts at a precise temperature","Mixtures melt over a range of temperatures","Dissolving a solid in water creates a mixture","Filtering separates all mixtures","Pure water boils at exactly 100°C at standard pressure","Salt water is a mixture"],correct:[0,1,2,4,5]},
  {topic:"States of matter",q:"Which of the following separation techniques match their correct use?",hint:"Different methods separate mixtures in different ways.",options:["Filtration separates an insoluble solid from a liquid","Distillation separates a dissolved solid from a solvent","Chromatography separates mixtures of dyes","Evaporation recovers a dissolved solid by removing the solvent","Decanting separates two liquids of different densities","Crystallisation is used to obtain a pure solid from a solution"],correct:[0,2,3,5]},
  {topic:"States of matter",q:"Which of the following correctly describe the properties of gases?",hint:"Gases behave very differently from solids and liquids.",options:["Gases fill the container they are in","Gases can be compressed","Gas particles move quickly and randomly","Gases have a fixed shape","Gases have low density compared to solids","Gas pressure increases when the gas is compressed into a smaller volume"],correct:[0,1,2,4,5]},

  // ── ACIDS, ALKALIS & pH ───────────────────────────────────────────────────
  {topic:"Acids, alkalis & pH",q:"Which of the following are correct statements about the pH scale?",hint:"The pH scale runs from 0 to 14.",options:["A pH of 7 is neutral","Acids have a pH below 7","Alkalis have a pH above 7","A pH of 1 is a weak acid","Lemon juice has a pH below 7","Pure water has a pH of 7"],correct:[0,1,2,4,5]},
  {topic:"Acids, alkalis & pH",q:"Which of the following are indicators and what colour do they turn in acid?",hint:"Indicators change colour depending on pH.",options:["Litmus turns red in acid","Universal indicator turns red/orange in acid","Phenolphthalein turns pink in acid","Methyl orange turns red in acid","Litmus turns blue in acid","Universal indicator turns purple in neutral solution"],correct:[0,1,3]},
  {topic:"Acids, alkalis & pH",q:"Which of the following are products of a neutralisation reaction between an acid and an alkali?",hint:"Neutralisation produces a salt and water.",options:["Salt","Water","Carbon dioxide","A neutral solution","Hydrogen gas","An oxide"],correct:[0,1,3]},
  {topic:"Acids, alkalis & pH",q:"Which of the following are examples of common acids?",hint:"Some acids are found in everyday foods.",options:["Hydrochloric acid","Sulfuric acid","Sodium hydroxide","Citric acid","Ethanoic acid (vinegar)","Calcium hydroxide"],correct:[0,1,3,4]},
  {topic:"Acids, alkalis & pH",q:"Which of the following correctly describe what happens when a metal reacts with an acid?",hint:"Metals react with acids to produce a gas.",options:["A salt is produced","Hydrogen gas is produced","Carbon dioxide is produced","The reaction is exothermic","The metal dissolves","Water is always produced"],correct:[0,1,3,4]},

let state = ALL_QUESTIONS.map(() => ({ selected: new Set(), checked: false }));

function getTopics() {
  const seen = [];
  ALL_QUESTIONS.forEach(q => { if (!seen.includes(q.topic)) seen.push(q.topic); });
  return seen;
}

function toggle(qi, oi) {
  if (state[qi].checked) return;
  const s = state[qi].selected;
  if (s.has(oi)) s.delete(oi); else s.add(oi);
  renderQuestion(qi);
  updateProgress();
}

function checkQ(qi) {
  state[qi].checked = true;
  renderQuestion(qi);
  document.getElementById(`chkbtn-${qi}`).classList.add('done');
  document.getElementById(`chkbtn-${qi}`).disabled = true;
  updateProgress();
}

function checkAll() {
  ALL_QUESTIONS.forEach((_, qi) => { state[qi].checked = true; });
  document.querySelectorAll('.check-btn').forEach(b => { b.classList.add('done'); b.disabled = true; });
  document.querySelectorAll('.qcard').forEach((card, qi) => renderQuestionInPlace(qi));
  updateProgress();
}

function resetAll() {
  state = ALL_QUESTIONS.map(() => ({ selected: new Set(), checked: false }));
  buildQuiz();
  updateProgress();
}

function computeScore() {
  let correct = 0, total = 0;
  ALL_QUESTIONS.forEach((q, qi) => {
    if (!state[qi].checked) return;
    const cs = new Set(q.correct);
    const chosen = state[qi].selected;
    q.options.forEach((_, oi) => {
      total++;
      if (cs.has(oi) && chosen.has(oi)) correct++;
      else if (!cs.has(oi) && !chosen.has(oi)) correct++;
    });
  });
  return { correct, total };
}

function updateProgress() {
  const checked = state.filter(s => s.checked).length;
  const pct = Math.round((checked / ALL_QUESTIONS.length) * 100);
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('prog-label').textContent = `${checked} of ${ALL_QUESTIONS.length} checked`;
  const { correct, total } = computeScore();
  const scorePct = total > 0 ? Math.round((correct / total) * 100) : 0;
  document.getElementById('score-label').textContent = total > 0 ? `Score: ${scorePct}%` : 'Score: —';
  document.getElementById('live-score').textContent = total > 0 ? `${scorePct}%` : '—';
}

function optClass(qi, oi, checked) {
  const chosen = state[qi].selected.has(oi);
  const correct = ALL_QUESTIONS[qi].correct.includes(oi);
  if (!checked) return chosen ? 'selected' : '';
  if (chosen && correct) return 'correct';
  if (chosen && !correct) return 'wrong';
  if (!chosen && correct) return 'missed';
  return '';
}

function optIcon(cls) {
  if (cls === 'correct') return '✓';
  if (cls === 'wrong') return '✕';
  if (cls === 'missed') return '!';
  if (cls === 'selected') return '✓';
  return '';
}

function renderQuestion(qi) {
  const el = document.getElementById(`q-${qi}`);
  if (el) el.outerHTML = questionHTML(qi);
}

function renderQuestionInPlace(qi) {
  const el = document.getElementById(`q-${qi}`);
  if (el) el.outerHTML = questionHTML(qi);
}

function questionHTML(qi) {
  const q = ALL_QUESTIONS[qi];
  const s = state[qi];
  const opts = q.options.map((opt, oi) => {
    const cls = optClass(qi, oi, s.checked);
    const icon = optIcon(cls);
    return `<div class="opt${cls ? ' '+cls : ''}${s.checked?' disabled':''}" onclick="${s.checked?'':'toggle('+qi+','+oi+')'}">
      <div class="cb">${icon}</div>
      <span>${opt}</span>
    </div>`;
  }).join('');
  return `<div class="qcard" id="q-${qi}">
    <div class="qnum">Q${qi+1}</div>
    <div class="qtext">${q.q}</div>
    <div class="hint">${q.hint}</div>
    <div class="options">${opts}</div>
    <button class="check-btn${s.checked?' done':''}" id="chkbtn-${qi}" onclick="checkQ(${qi})" ${s.checked?'disabled':''}>Check answer</button>
  </div>`;
}

function buildQuiz() {
  const root = document.getElementById('quiz-root');
  const topics = getTopics();
  let html = '';
  topics.forEach(topic => {
    html += `<div class="topic-label">${topic}</div>`;
    ALL_QUESTIONS.forEach((q, qi) => {
      if (q.topic === topic) html += questionHTML(qi);
    });
  });
  root.innerHTML = html;
}

buildQuiz();
updateProgress();
</script>
